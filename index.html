<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name Collector | Azizbek Abdullayev</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>Name Collector</h1>
      <p style="color: grey">Type a name and press Add</p>
      <input type="text" id="input" placeholder="Enter a name" />
      <div class="Btns">
        <button class="btn" id="btn">Add name</button>
        <button class="clearAll" id="clearAll">Clear All</button>
      </div>
      <p class="error" style="color: red; display: none">
        Please enter a name!
      </p>
      <p class="count">
        Total names: <span class="textCount" id="totalCount">0</span>
      </p>
      <div id="result"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
